services:
  - type: web
    name: bot-workstation
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: SEATALK_APP_ID
        sync: false
      - key: SEATALK_APP_SECRET
        sync: false
      - key: SEATALK_SIGNING_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SHEET_ID
        value: 1APnTQXUQvWpTwmOLIC9U17kwjQcWX0BPYZvlfUPOJrU
      - key: TAB_NAME
        value: Compliance Tracker
      - key: CAPTURE_RANGE
        value: A1:X80
      - key: BOT_CONFIG_TAB
        value: bot_config
      - key: BOT_NAME
        value: Bot Workstation
      - key: REPORT_LINK
        value: https://docs.google.com/spreadsheets/d/1APnTQXUQvWpTwmOLIC9U17kwjQcWX0BPYZvlfUPOJrU/edit?gid=755895903#gid=755895903
      - key: APP_TIMEZONE
        value: Asia/Manila
      - key: ENABLE_CHANGE_SENDS
        value: "true"
      - key: WATCH_TAB
        value: Summary Sheet (In progress)
      - key: WATCH_CELL
        value: AE6
      - key: WATCH_POLL_SECONDS
        value: "5"
      - key: CHANGE_SETTLE_SECONDS
        value: "7"
      - key: ENABLE_SCHEDULED_SENDS
        value: "false"
      - key: IMAGE_FORMAT
        value: png
      - key: PNG_DPI
        value: "300"
      - key: PNG_MAX_WIDTH
        value: "2400"
      - key: WORK_DIR
        value: /app/tmp
